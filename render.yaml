# Render Blueprint — detector API (+ optional SecureChat UI in chatbot/)
# Deploy: https://render.com/deploy → connect this repo → set secrets below.

services:
  - type: web
    name: prompt-injection-detector
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements-prod.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SKIP_STARTUP_MODEL_LOAD
        value: "true"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RED_TEAM_API_KEY
        sync: false
